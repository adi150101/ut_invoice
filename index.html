<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Invoice</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="container">

    <h2>Create Invoice</h2>

    <!-- ===================== -->
    <!-- CLIENT -->
    <!-- ===================== -->
    <label>Client Name</label>
    <input id="client" placeholder="Masukkan nama client">

    <!-- ===================== -->
    <!-- CREATOR -->
    <!-- ===================== -->
    <label>Created</label>
    <select id="creator">
      <option value="Ucup">Ucup</option>
      <option value="Jul">Jul</option>
    </select>

    <!-- ===================== -->
    <!-- ITEM INPUT -->
    <!-- ===================== -->
    <label>Item</label>
    <input id="itemName" placeholder="Nama item">

    <label>Harga</label>
    <input id="itemPrice" type="number" placeholder="Masukkan harga">

    <button onclick="addItem()">+ Tambah Item</button>

    <!-- ===================== -->
    <!-- ITEM LIST -->
    <!-- ===================== -->
    <h3>Item List</h3>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Harga</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="itemList"></tbody>
    </table>

    <!-- ===================== -->
    <!-- TOTAL -->
    <!-- ===================== -->
    <div class="total-preview">
      Total: <b id="totalPreview">Rp 0</b>
    </div>

    <!-- ===================== -->
    <!-- ACTION -->
    <!-- ===================== -->
    <button onclick="goToInvoice()">Generate Invoice</button>

  </div>

  <!-- JS -->
  <script src="js/app.js"></script>

</body>
</html>
