<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Invoice</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <main class="container">

    <h2>Create Invoice</h2>

    <!-- ===================== -->
    <!-- CLIENT -->
    <!-- ===================== -->
    <div class="form-group">
      <label for="client">Client Name</label>
      <input id="client" placeholder="Masukkan nama client" autocomplete="off">
    </div>

    <!-- ===================== -->
    <!-- CREATOR -->
    <!-- ===================== -->
    <div class="form-group">
      <label for="creator">Created By</label>
      <select id="creator">
        <option value="Ucup">Ucup</option>
        <option value="Jul">Jul</option>
      </select>
    </div>

    <!-- ===================== -->
    <!-- ITEM INPUT -->
    <!-- ===================== -->
    <div class="form-group">
      <label for="itemName">Item</label>
      <input id="itemName" placeholder="Nama item" autocomplete="off">
    </div>

    <div class="form-row">
      <div>
        <label for="itemPrice">Harga</label>
        <input id="itemPrice" type="number" placeholder="Masukkan harga" min="1">
      </div>

      <div>
        <label for="itemQty">Qty</label>
        <input id="itemQty" type="number" value="1" min="1">
      </div>
    </div>

    <button type="button" onclick="addItem()">+ Tambah Item</button>

    <!-- ===================== -->
    <!-- ITEM LIST -->
    <!-- ===================== -->
    <h3>Item List</h3>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Qty</th>
          <th>Price</th>
          <th>Amount</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="itemList"></tbody>
    </table>

    <!-- ===================== -->
    <!-- TOTAL -->
    <!-- ===================== -->
    <div class="total-preview">
      Total: <b id="totalPreview">Rp 0</b>
    </div>

    <!-- ===================== -->
    <!-- DISCOUNT -->
    <!-- ===================== -->
    <div class="form-group">
      <label for="discount">Discount (%)</label>
      <input id="discount" type="number" placeholder="Contoh: 10" min="0" max="100">
    </div>

    <!-- ===================== -->
    <!-- ACTION -->
    <!-- ===================== -->
    <button type="button" onclick="goToInvoice()">Generate Invoice</button>

  </main>

  <!-- JS -->
  <script src="js/app.js"></script>

</body>
</html>
